# Reward-Margin-Guided Active DPO loop (activeuf.loop.run_dpo)
env_local_path: .env.local

# --- data / output ---
inputs_path: datasets/dolci_annotated_new_21models_min8_refiltered
base_output_dir: datasets/dolci/active_orig/active_dpo
base_logs_dir: logs/active_dpo
wandb_project: active_dpo
wandb_entity: ActiveUF_Plus
run_id: ""              # auto-generated from threshold + timestamp if empty

# --- policy / reference (full fine-tuning) ---
model_path: /iopsstor/scratch/cscs/dmelikidze/huggingface/hub/models--allenai--Olmo-3-7B-Instruct-SFT/snapshots/e1452fc572d51966ff4aaeb25118b891eb93e549

# --- acquisition ---
threshold: 2.5           # C, on the beta-scaled implicit-margin scale (= DPO reward margin
                         #   chosen_reward - rejected_reward). Picks the highest actual-gap
                         #   pair whose margin < C.
                         #   C=0    -> only pairs the policy does NOT yet prefer (margin<0).
                         #             At init policy==ref so margin==0 everywhere => all
                         #             fallback until the policy moves; use small C>0 to
                         #             admit pairs from step 0.
                         #   C=+inf -> always the max-gap pair (best vs worst) = rank-order DPO.
                         #   C=-inf -> never passes => always fallback, which is ALSO best vs
                         #             worst here, so it coincides with C=+inf.
length_normalize: false  # applied to BOTH the acquisition Delta_pi and the DPO loss
acquisition_micro_batch_size: 64    # max completions per logp batch (cap)
acquisition_token_budget: 16384     # max (count * seq_len) per logp batch -> bounds memory,
                                    #   lets short completions pack into big batches
min_non_truncated: 8     # match the maxmin DPO dataset's prompt set: keep only prompts
                         #   with >= 8 non-truncated completions (best/worst selected among them)

# --- loop ---
seed: 42                          # match the DPO baseline (training.sbatch default MySeed=42)
max_length: 4096
outer_loop_batch_size: 256        # B: prompts per outer batch (-> B selected pairs)
num_train_epochs: 1               # one pass over the dataset
save_every_n_steps: 25            # save a full policy checkpoint every N optimizer steps
debug: true               # SMOKE TEST: limits to 1001 prompts. Set back to false for the real run.

# --- DPO optimization (mirrors configs/dpo_training.yaml) ---
beta: 0.05                        # matches the DPO baseline (no length norm -> summed logps)
per_device_train_batch_size: 2    # concatenated forward scores 2x this many seqs at once
effective_batch_size: 128         # fixed target; grad_accum auto-derives from GPU count
                                  #   (= effective_batch_size / (per_device * world_size))
learning_rate: 1.0e-6
lr_scheduler_type: linear
warmup_ratio: 0.1
max_grad_norm: 1.0                 # gradient clipping (matches the TRL baseline default)
gradient_checkpointing: true
