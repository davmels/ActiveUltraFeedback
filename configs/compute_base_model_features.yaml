seed: 42
debug: false

inputs_path: datasets/dolci_annotated
batch_size: 64
max_length: 4096
n_batches_per_checkpoint: 500

enn:
  model:
    base_model_name_or_path: Skywork/Skywork-Reward-V2-Qwen3-4B
    num_heads: 20
    head_num_layers: 2
    head_hidden_dim: 128
    head_initialization_xavier_gain: 1.0
    freeze_base_model: true
    feature_extraction_layer: last_hidden_state