training:
  gradient_checkpointing: true
  max_length: 4096
  per_device_train_batch_size: 2   # 2 x gas 2 x (8 nodes x 4 GPUs = 32) = 128 effective, matching
                                   #   the loop. NOTE: tied to 8 nodes; for 4 nodes set this back to 4.
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-6
  lr_scheduler_type: linear
  warmup_ratio: 0.1
  num_train_epochs: 1
  dataset_num_proc: 32              # parallelize the trainer's tokenization (TRL tokenize_row map)
  report_to: wandb
  logging_steps: 1
  beta: 0.05
  save_steps: 1000
  bf16: true
  bf16_full_eval: true
